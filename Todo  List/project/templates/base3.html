<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Dashboard | Todo</title>

<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">

<style>
    body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #f4f6fb;
    }

    /* NAVBAR */
    .navbar {
        background: #1f2933;
        padding: 12px 25px;
    }

    .navbar-brand {
        color: white !important;
        font-weight: 600;
        font-size: 20px;
    }

    .navbar-nav .nav-link {
        color: #cbd5e1 !important;
        font-size: 15px;
        margin-right: 15px;
    }

    .navbar-nav .nav-link:hover,
    .navbar-nav .nav-link.active {
        color: #ffffff !important;
    }

    /* Dropdown */
    .dropdown-menu {
        background: #1f2937;
        border: none;
    }

    .dropdown-menu a,
    .dropdown-menu button {
        color: #cbd5e1;
        font-size: 14px;
    }

    .dropdown-menu a:hover,
    .dropdown-menu button:hover {
        background: #374151;
        color: #ffffff;
    }

    /* Right icons */
    .nav-icons {
        display: flex;
        align-items: center;
        gap: 20px;
    }

    .nav-icons i {
        color: white;
        font-size: 20px;
        cursor: pointer;
    }

    .dropdown-menu-right {
        right: 0;
        left: auto;
    }

    .dropdown-item button {
        background: none;
        border: none;
        width: 100%;
        text-align: left;
        padding: 0;
        color: inherit;
    }
    .content {
        padding: 40px;
    }
</style>
</head>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark">
    <a class="navbar-brand" href="#">TODO LIST</a>

    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarMenu">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarMenu">

        <ul class="navbar-nav mr-auto">
            <li class="nav-item">
                <a class="nav-link active" href="#"><i class="fa fa-home"></i> Home</a>
            </li>

            <li class="nav-item dropdown">
                <a class="nav-link dropdown-toggle" href="#" data-toggle="dropdown">
                    <i class="fa fa-tasks"></i> Tasks
                </a>
                <div class="dropdown-menu">
                    <a class="dropdown-item" href="{% url 'add_category' %}">
                        <i class="fa fa-play-circle"></i> Category
                    </a>
                       <a class="dropdown-item" href="{% url 'admin_tasks_users' %}">
                        <i class="fa fa-play-circle"></i> Task 
                    </a>
                </div>
            </li>
        </ul>
        <div class="nav-icons dropdown">
            <i class="fa fa-user-circle dropdown-toggle"
               data-toggle="dropdown"
               aria-haspopup="true"
               aria-expanded="false"></i>

            <div class="dropdown-menu dropdown-menu-right">
                <a class="dropdown-item" href="{% url 'profile' %}">
                    <i class="fa fa-user"></i> Profile
                </a>

                <div class="dropdown-divider"></div>

                <!-- LOGOUT FORM -->
                <form method="post" action="{% url 'adminlogout' %}">
                    {% csrf_token %}
                    <button type="submit" class="dropdown-item text-danger">
                        <i class="fa fa-sign-out"></i> Logout
                    </button>
                </form>
            </div>
        </div>

    </div>
</nav>

<!-- PAGE CONTENT -->
<div class="content">
    {% block content %}
    {% endblock %}
</div>

<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>

</body>
</html>
