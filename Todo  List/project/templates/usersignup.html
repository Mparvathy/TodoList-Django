<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
<meta charset="UTF-8">
<title>User Signup</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">

<style>

.signup-wrapper{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#eef2ff;
}

.signup-card{
background:white;
padding:40px;
border-radius:20px;
width:100%;
max-width:450px;
box-shadow:0 25px 45px rgba(0,0,0,.2);
text-align:center;
}

.form-control{
border-radius:30px;
padding:12px 18px;
margin-bottom:15px;
}

.btn-sign{
border-radius:30px;
background:#6366f1;
color:white;
padding:12px;
width:100%;
}

.btn-sign:hover{
background:#4f46e5;
}

</style>
</head>

<body>

<div class="signup-wrapper">
<div class="signup-card">

<h4 class="mb-4">Create Account</h4>

{% if messages %}
{% for message in messages %}
<div class="alert alert-danger">{{ message }}</div>
{% endfor %}
{% endif %}

{% if signup_success %}
<div class="alert alert-success">
Account created successfully! Please login.
</div>
{% endif %}

<form method="POST">
{% csrf_token %}

<input type="text" name="u" class="form-control" placeholder="Username" required>

<input type="text" name="f" class="form-control" placeholder="Full Name" required>

<input type="email" name="e" class="form-control" placeholder="Email" required>

<input type="tel" name="n" class="form-control"
pattern="[6-9]{1}[0-9]{9}"
maxlength="10"
placeholder="Phone Number (10 digits)" required>

<input type="password" name="p" class="form-control" placeholder="Password" required>

<button type="submit" class="btn btn-sign">Register</button>

</form>

<div class="mt-3">
Already have account?
<a href="{% url 'userlogin' %}">Login</a>
</div>

</div>
</div>

</body>
</html>
